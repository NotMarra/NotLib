name: Bug report
description: Something isn't working as expected.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in as much detail as possible.

  - type: input
    id: notlib-version
    attributes:
      label: NotLib version
      placeholder: "e.g. 1.2.0"
    validations:
      required: true

  - type: input
    id: server-version
    attributes:
      label: Paper / Folia version
      placeholder: "e.g. Paper 1.21.4 build 123"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Create a CachedRepository with WRITE_BEHIND
        2. Call upsert() after the entity already exists
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: stacktrace
    attributes:
      label: Stack trace
      description: Paste the full stack trace from the server console if applicable.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information that might help.
